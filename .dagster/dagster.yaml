# =============================================================================
# Dagster Instance Configuration — Macro Trading System
# =============================================================================

telemetry:
  enabled: false

# Use PostgreSQL (TimescaleDB) for run/event/schedule storage
storage:
  postgres:
    postgres_url:
      env: DATABASE_URL

# Run coordinator — controls max concurrent runs
run_coordinator:
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 3
    dequeue_interval_seconds: 10

sensors:
  use_threads: true
  num_workers: 4

# Retention — auto-purge old ticks
retention:
  schedule:
    purge_after_days:
      skipped: 7
      failure: 30
      success: 7
  sensor:
    purge_after_days:
      skipped: 7
      failure: 30
      success: 7
