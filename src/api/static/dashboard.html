<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Macro PMS</title>

  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- React 18 — pinned to exact version for production stability -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX — pinned -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <!-- Tailwind CSS — plugins included for better UI -->
  <script src="https://cdn.tailwindcss.com/3.4.17?plugins=forms,typography,aspect-ratio,container-queries"></script>

  <!-- prop-types (required by Recharts UMD) — pinned -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <!-- Recharts — pinned -->
  <script crossorigin src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>

  <!-- React Router (HashRouter) - dependencies must load in order — all pinned -->
  <script crossorigin src="https://unpkg.com/@remix-run/router@1.21.0/dist/router.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router@6.28.0/dist/umd/react-router.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-router-dom@6.28.0/dist/umd/react-router-dom.production.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            // Enhanced base grays with subtle blue tint for premium dark look
            gray: {
              950: '#06080b',
              900: '#0B0F15',
              850: '#121820',
              800: '#18202b',
              700: '#232f3f',
              600: '#34455a',
              500: '#4f647d',
              400: '#758ba5',
              300: '#9db0c6',
              200: '#cad6e4',
              100: '#eef2f6',
            },
            // Vibrant state colors
            green: { 500: '#10b981', 400: '#34d399' },
            red: { 500: '#ef4444', 400: '#f87171' },
            amber: { 500: '#f59e0b', 400: '#fbbf24' },
            blue: { 500: '#3b82f6', 600: '#2563eb' },
            // PMS semantic overrides mapping to new vibrant palette
            pms: {
              bg: '#0B0F15',
              surface: '#121820', // slightly elevated
              glass: 'rgba(18, 24, 32, 0.7)', // translucent surface
              border: '#232f3f', // subtle border
              green: '#10b981',
              red: '#ef4444',
              yellow: '#f59e0b',
              blue: '#3b82f6',
            },
          },
          animation: {
            'slide-in': 'slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
            'fade-in': 'fadeIn 0.2s ease-out',
            'pulse-soft': 'pulseSoft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            slideIn: {
              '0%': { transform: 'translateX(100%)', opacity: 0 },
              '100%': { transform: 'translateX(0)', opacity: 1 },
            },
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            pulseSoft: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: 0.7 },
            }
          }
        },
      },
    };
  </script>

  <style>
    body {
      background-color: #06080b; /* Deepest background color */
      background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.05), transparent 400px), 
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.05), transparent 400px);
      background-attachment: fixed;
      margin: 0;
      color: #eef2f6;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Modern Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #232f3f; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #34455a; }

    /* Utility classes */
    .small-caps { font-variant: small-caps; letter-spacing: 0.08em; }
    .skeleton { animation: pulseSoft 2s infinite; }
    
    /* Glassmorphism primitives */
    .glass-panel {
      background: rgba(18, 24, 32, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }
    
    /* Elegant Hover Effect */
    .hover-glow:hover {
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.3);
    }

    /* Responsive breakpoints for tablet */
    @media (max-width: 1024px) {
      .ml-56 { margin-left: 4.5rem !important; }
      .w-56 { width: 4.5rem !important; }
    }
    @media (max-width: 768px) {
      .ml-56 { margin-left: 0 !important; }
      .w-56 { display: none !important; }
      .w-16 { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load .jsx files in dependency order: hooks -> pms libs -> utils -> Sidebar -> PMS pages -> App -->
  <script type="text/babel" src="/static/js/hooks.jsx"></script>
  <script type="text/babel" src="/static/js/pms/theme.jsx"></script>
  <script type="text/babel" src="/static/js/pms/components.jsx"></script>
  <script type="text/babel" src="/static/js/pms/utils.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/MorningPackPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/PositionBookPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/TradeBlotterPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/RiskMonitorPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/PerformanceAttributionPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/DecisionJournalPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/AgentIntelPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/ComplianceAuditPage.jsx"></script>
  <script type="text/babel" src="/static/js/pms/pages/PMSSignalsPage.jsx"></script>
  <script type="text/babel" src="/static/js/Sidebar.jsx"></script>
  <script type="text/babel" src="/static/js/App.jsx"></script>

  <!-- Mount the application -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
